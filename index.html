<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8J4FX3qSFlCgYEPXaBGC9Lf6yhCHt9OY", 
            authDomain: "giao-luu-fandom.firebaseapp.com",
            projectId: "giao-luu-fandom",
            storageBucket: "giao-luu-fandom.appspot.com",
            messagingSenderId: "...", 
            appId: "..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).catch((error) => console.error(error));

        const viewHome = document.getElementById('view-home');
        const viewWatch = document.getElementById('view-watch');
        const movieGridList = document.getElementById('movie-grid-list');
        const featuredCarousel = document.getElementById('featured-carousel');
        const quickEpisodes = document.getElementById('quick-episodes');
        const btnCoconut = document.getElementById('btn-coconut');

        let localMoviesCache = {};

        const qMovies = query(collection(db, "movies"), orderBy("year", "desc"));
        onSnapshot(qMovies, (snapshot) => {
            let gridHtml = "", carouselHtml = "", quickEpHtml = "";
            localMoviesCache = {};

            snapshot.forEach((doc) => {
                const movie = doc.data();
                localMoviesCache[doc.id] = movie;

                gridHtml += `<div class="movie-card" data-movie-id="${doc.id}">
                    <div class="poster-wrapper">
                        <img src="${movie.poster || 'https://via.placeholder.com/300x180'}">
                        <div class="episode-badge">Tập ${movie.duration || 'New'}</div>
                    </div>
                    <div class="movie-card-info"><h4 class="movie-card-title">${movie.title}</h4></div>
                </div>`;

                carouselHtml += `<div class="carousel-item" data-movie-id="${doc.id}"><img src="${movie.poster}"></div>`;
                quickEpHtml += `<button class="quick-ep-btn" data-movie-id="${doc.id}">Tập ${movie.duration}: ${movie.title}</button>`;
            });

            movieGridList.innerHTML = gridHtml;
            featuredCarousel.innerHTML = carouselHtml;
            quickEpisodes.innerHTML = quickEpHtml;

            document.querySelectorAll('[data-movie-id]').forEach(el => {
                el.addEventListener('click', () => switchPageToWatch(el.getAttribute('data-movie-id')));
            });
        });

        function switchPageToWatch(id) {
            const movie = localMoviesCache[id];
            if (!movie) return;

            document.getElementById('player-zone').innerHTML = movie.url || "Link lỗi";
            document.getElementById('watch-title').innerText = movie.title;
            document.getElementById('watch-meta').innerText = `Năm: ${movie.year} • Tập: ${movie.duration}`;

            viewHome.classList.remove('active');
            viewWatch.classList.add('active');
            window.location.hash = `watch?id=${id}`;
        }

        btnCoconut.addEventListener('click', () => {
            viewWatch.classList.remove('active');
            viewHome.classList.add('active');
            window.location.hash = "";
        });
    </script>
