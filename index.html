<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Fansub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        .active { display: block !important; }
        #view-home, #view-watch { display: none; }

        /* Lưới phim */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 30px;
        }
        
        .movie-card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .movie-card:hover { transform: translateY(-10px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .movie-card h4 { margin: 12px 0 0 0; font-size: 15px; color: #333; }

        /* Player */
        #player-zone {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        #player-zone iframe { width: 100%; height: 100%; }
        
        header { padding: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; }
    </style>
</head>
<body>

    <div id="view-home" class="active">
        <header><h1>Doraemon Fansub</h1></header>
        <div id="movie-grid-list" class="movie-grid"></div>
    </div>

    <div id="view-watch">
        <header>
            <button id="btn-coconut">← Quay lại</button>
            <h2 id="watch-title" style="display:inline; margin-left: 15px;"></h2>
        </header>
        <div id="player-zone"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8J4FX3qSFlCgYEPXaBGC9Lf6yhCHt9OY", 
            authDomain: "giao-luu-fandom.firebaseapp.com",
            projectId: "giao-luu-fandom",
            storageBucket: "giao-luu-fandom.appspot.com",
            messagingSenderId: "503216355558", 
            appId: "1:503216355558:web:39483fb414e68536476327" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).catch(console.error);

        const viewHome = document.getElementById('view-home');
        const viewWatch = document.getElementById('view-watch');
        const movieGridList = document.getElementById('movie-grid-list');
        
        let localMoviesCache = {};

        onSnapshot(query(collection(db, "movies"), orderBy("year", "desc")), (snapshot) => {
            let html = "";
            snapshot.forEach((doc) => {
                const m = doc.data();
                localMoviesCache[doc.id] = m;
                html += `<div class="movie-card" data-id="${doc.id}">
                            <img src="${m.poster || 'https://via.placeholder.com/300x180'}">
                            <h4>${m.title}</h4>
                         </div>`;
            });
            movieGridList.innerHTML = html;
        });

        document.addEventListener('click', (e) => {
            const card = e.target.closest('.movie-card');
            if (card) {
                const m = localMoviesCache[card.dataset.id];
                document.getElementById('player-zone').innerHTML = `<iframe src="${m.url}" frameborder="0" allowfullscreen></iframe>`;
                document.getElementById('watch-title').innerText = m.title;
                viewHome.classList.remove('active');
                viewWatch.classList.add('active');
            }
        });

        document.getElementById('btn-coconut').addEventListener('click', () => {
            viewWatch.classList.remove('active');
            viewHome.classList.add('active');
        });
    </script>
</body>
</html>
