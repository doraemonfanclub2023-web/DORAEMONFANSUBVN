<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Hiện đại & Tối giản</title>
    <!-- Font chữ Inter chuẩn quốc tế cực sang -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icon FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary-color: #4a90e2;
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header tinh tế */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-color);
        }

        .nav-links li.active a {
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Lưới hiển thị danh sách phim Realtime từ Firebase */
        .movie-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 10px;
        }

        /* Thẻ bài viết mềm mại / Thẻ phim */
        .movie-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .movie-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .movie-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .movie-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .btn-watch {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-watch:hover {
            background: #357abd;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Thanh điều hướng Header -->
        <header class="header">
            <div class="logo">Workspace.</div>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="congdong.html">Cộng đồng</a></li>
                <li class="active"><a href="phim.html">Phim</a></li>
                <li><a href="duan.html">Dự án</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </header>

        <!-- KHU VỰC HIỂN THỊ PHIM TỰ ĐỘNG (Đã xóa bỏ hoàn toàn phim viết cứng) -->
        <div id="viewMovies" class="movie-layout">
            <p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Đang tải danh sách phim từ hệ thống...</p>
        </div>
    </div>

    <!-- KHU VỰC SCRIPT MODULE (Chứa cấu hình Firebase toàn vẹn) -->
    <script type="module">
        // Bạn lưu ý giữ nguyên cụm Import và đoạn cấu hình Firebase ban đầu (apiKey, authDomain, projectId...) của bạn ở đây nhé
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase cá nhân của bạn (Điền phần config của bạn vào đây nếu chưa có)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "giao-luu-fandom.firebaseapp.com",
            projectId: "giao-luu-fandom",
            storageBucket: "giao-luu-fandom.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LẮNG NGHE DANH SÁCH PHIM THỜI GIAN THỰC TỪ FIRESTORE ---
        const viewMovies = document.getElementById('viewMovies');
        const qMovies = query(collection(db, "movies"), orderBy("year", "desc"));

        onSnapshot(qMovies, (snapshot) => {
            if (snapshot.empty) {
                viewMovies.innerHTML = `<p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Hiện chưa có phim nào được nhúng.</p>`;
                return;
            }

            let movieHtml = "";
            snapshot.forEach((doc) => {
                const movie = doc.data();
                
                let videoContent = "";
                // Kiểm tra xem dữ liệu url có chứa thẻ iframe nhúng phim hay không
                if (movie.url && movie.url.includes("<iframe")) {
                    videoContent = `<div class="movie-player" style="width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #000;">${movie.url}</div>`;
                } else {
                    videoContent = `
                        <img src="${movie.poster || 'https://via.placeholder.com/500x300'}" class="movie-poster" alt="${movie.title}">
                        <div style="padding: 0 20px;"><a href="${movie.url || '#'}" target="_blank" class="btn-watch"><i class="fa-solid fa-play"></i> Xem Ngay</a></div>
                    `;
                }

                // Nếu là phim dạng iframe, cho thẻ card co giãn rộng gấp đôi cho dễ xem phim
                const cardStyle = (movie.url && movie.url.includes("<iframe")) ? "grid-column: span 2; min-width: 100%;" : "auto";

                movieHtml += `
                    <div class="movie-card" style="${cardStyle}">
                        ${videoContent}
                        <div class="movie-info">
                            <div>
                                <h3 class="movie-title">${movie.title || 'Chưa có tên'}</h3>
                                <div class="movie-meta">Năm: ${movie.year || '----'}</div>
                            </div>
                            <div class="movie-meta" style="margin-top: 5px;"><i class="fa-regular fa-clock"></i> Thời lượng: ${movie.duration || '0'} phút</div>
                        </div>
                    </div>
                `;
            });
            viewMovies.innerHTML = movieHtml;
        }, (error) => {
            console.error("Lỗi khi tải dữ liệu phim:", error);
            viewMovies.innerHTML = `<p style="text-align: center; color: #e53e3e; grid-column: 1/-1;">Không thể tải danh sách phim. Vui lòng kiểm tra phân quyền Rules.</p>`;
        });
    </script>
</body>
</html>
