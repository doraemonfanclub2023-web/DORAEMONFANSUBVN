<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Web Style Oxxo</title>
    <!-- Nhúng Font chữ giống trong code của bạn -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;700&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <!-- Nhúng FontAwesome để làm icon tìm kiếm, icon mạng xã hội -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

    <style>
        /* Định hình cấu trúc màu sắc và font chữ nền */
        body {
            background-color: #74b9ff; /* Màu nền xanh pastel */
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Phần Header Logo */
        .header-wrap {
            text-align: center;
            padding: 40px 0;
        }
        .header-logo h1 {
            font-family: 'Lexend Exa', sans-serif;
            color: #000000;
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
        }

        /* Thanh Menu chính thiết kế bo tròn viền đen đổ bóng */
        .header-menu {
            max-width: 1170px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .block-sign {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 40px;
            box-shadow: 0 3px 0 0 #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            padding: 0 20px;
        }

        /* Danh sách Menu điều hướng */
        .main-menu-nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .main-menu-nav li a {
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0 15px;
            line-height: 80px;
            display: block;
            transition: color 0.2s;
        }
        .main-menu-nav li a:hover {
            color: #fbc02d; /* Màu vàng khi di chuột vào */
        }

        /* Nút tìm kiếm bên phải menu */
        .search-box {
            color: #000000;
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
        }
        .search-box:hover {
            color: #fbc02d;
        }

        /* Khu vực nội dung hiển thị chính bên dưới */
        .content-wrapper {
            max-width: 1170px;
            margin: 40px auto;
            padding: 0 15px;
        }
        .main-post {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 40px;
            box-shadow: 0 3px 0 0 #000000;
            padding: 30px;
            min-height: 200px;
        }
    </style>
</head>
<body>

    <!-- Khối Header chứa Tên Web -->
    <div class="header-wrap">
        <div class="header-logo">
            <h1>TÊN WEB CỦA BẠN</h1>
        </div>
    </div>

    <!-- Khối Menu bo tròn đổ bóng đặc trưng giống mẫu -->
    <div class="header-menu">
        <div class="block-sign">
            <ul class="main-menu-nav">
                <li><a href="#"><i class="fa fa-home"></i> Trang Chủ</a></li>
                <li><a href="#">Bài Viết</a></li>
                <li><a href="#">Tính Năng</a></li>
                <li><a href="#">Liên Hệ</a></li>
            </ul>
            <div class="search-box">
                <i class="fa fa-search"></i>
            </div>
        </div>
    </div>

    <!-- Khối Nội Dung Chính -->
    <div class="content-wrapper">
        <div class="main-post">
            <h2>Chào mừng bạn đến với Website!</h2>
            <p>Đây là phần nội dung trang web được thiết kế mô phỏng theo cấu trúc và màu sắc từ giao diện Oxxo bạn đã cung cấp.</p>
        </div>
    </div>

</body>
</html>
