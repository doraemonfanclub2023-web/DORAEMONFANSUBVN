<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng MonFansub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

    <style>
        :root {
            --bg-color: #0b0c0d;
            --card-bg: #151618;
            --border-color: #242528;
            --text-main: #f5f6f7;
            --text-muted: #9ca3af;
            --primary-color: #10b981; /* Màu xanh lá cây giống nút Tạo bài viết của bạn */
            --primary-hover: #059669;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* Header giống ảnh mẫu */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-item.active, .nav-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }

        /* Layout chia 3 cột chính */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 240px 1fr 300px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar-left, .sidebar-right { display: none; }
        }

        /* Menu trái */
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .sidebar-link.active, .sidebar-link:hover {
            color: #fff;
            background: var(--card-bg);
        }

        /* Khung tạo bài viết */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .create-post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .create-post-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .btn-submit {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            float: right;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        /* Card bài viết trên Feed */
        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            font-size: 14px;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .post-content {
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* Sidebar phải */
        .widget {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo"><i class="fa-solid fa-cat" style="color: #3b82f6;"></i> Doraemon Fansub Việt Nam 🇻🇳</div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Trang chủ</a>
                <a href="#" class="nav-item active">Cộng đồng</a>
            </nav>
        </div>
        <div class="header-right">
            <i class="fa-regular fa-bell" style="font-size: 18px; cursor: pointer;"></i>
            <img src="https://i.pravatar.cc/100?img=33" class="avatar" alt="User">
        </div>
    </header>

    <!-- Thân trang -->
    <div class="container">
        
        <!-- Cột trái: Menu điều hướng -->
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="#" class="sidebar-link active"><i class="fa-solid fa-rss"></i> Mới nhất</a></li>
                <li><a href="#" class="sidebar-link"><i class="fa-regular fa-user"></i> Đang theo dõi</a></li>
            </ul>
        </aside>

        <!-- Cột giữa: Khung đăng bài & Dòng thời gian -->
        <main class="feed-container">
            <!-- Khung tạo bài viết nhanh -->
            <div class="create-post-card clearfix">
                <textarea id="postInput" class="create-post-input" rows="3" placeholder="Chia sẻ suy nghĩ của bạn với các Mon-fan hôm nay nào..."></textarea>
                <button id="submitPost" class="btn-submit"><i class="fa-solid fa-pen"></i> Tạo bài viết</button>
            </div>

            <!-- Nơi chứa danh sách bài viết -->
            <div id="newsfeed"></div>
        </main>

        <!-- Cột phải: Thông tin cá nhân thu nhỏ -->
        <aside class="sidebar-right">
            <div class="widget">
                <div class="user-badge">
                    <img src="https://i.pravatar.cc/100?img=33" class="avatar" style="width: 40px; height: 40px;" alt="User">
                    <div class="author-info">
                        <span class="author-name">nguy?n tu?n kh?i</span>
                        <span class="post-time" style="color: #10b981;">Thành viên</span>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <!-- Logic JavaScript xử lý đăng và lưu bài viết tạm thời -->
    <script>
        const postInput = document.getElementById('postInput');
        const submitPost = document.getElementById('submitPost');
        const newsfeed = document.getElementById('newsfeed');

        // Hàm tải dữ liệu bài viết từ LocalStorage lên màn hình
        function loadPosts() {
            newsfeed.innerHTML = '';
            // Lấy danh sách bài viết từ bộ nhớ trình duyệt, nếu chưa có thì để mảng rỗng
            const posts = JSON.parse(localStorage.getItem('monfansub_posts')) || [
                {
                    name: "sangg_",
                    avatar: "https://i.pravatar.cc/100?img=12",
                    time: "2 giờ trước",
                    content: "Hôm nay xem lại tập phim ngắn năm 1999 thấy Nobita ngầu thực sự! Be cool 😎"
                }
            ];

            posts.forEach(post => {
                const postHTML = `
                    <div class="post-card" style="margin-bottom: 15px;">
                        <div class="post-header">
                            <img src="${post.avatar}" class="avatar" alt="User">
                            <div class="author-info">
                                <span class="author-name">${post.name}</span>
                                <span class="post-time">${post.time}</span>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
                newsfeed.innerHTML += postHTML;
            });
        }

        // Xử lý khi nhấn nút "Tạo bài viết"
        submitPost.addEventListener('click', () => {
            const content = postInput.value.trim();
            if (content === '') {
                alert('Vui lòng nhập nội dung bài viết!');
                return;
            }

            const currentPosts = JSON.parse(localStorage.getItem('monfansub_posts')) || [
                {
                    name: "sangg_",
                    avatar: "https://i.pravatar.cc/100?img=12",
                    time: "2 giờ trước",
                    content: "Hôm nay xem lại tập phim ngắn năm 1999 thấy Nobita ngầu thực sự! Be cool 😎"
                }
            ];

            // Thêm bài viết mới lên đầu mảng
            currentPosts.unshift({
                name: "nguy?n tu?n kh?i",
                avatar: "https://i.pravatar.cc/100?img=33",
                time: "Vừa xong",
                content: content
            });

            // Lưu mảng mới vào LocalStorage
            localStorage.setItem('monfansub_posts', JSON.stringify(currentPosts));

            // Reset khung nhập và làm mới danh sách hiển thị
            postInput.value = '';
            loadPosts();
        });

        // Chạy tải bài viết lần đầu khi mở trang
        loadPosts();
    </script>
</body>
</html>
