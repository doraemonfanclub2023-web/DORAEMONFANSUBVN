<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng Giao lưu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary-color: #4a90e2;
            --border-color: rgba(255, 255, 255, 0.6);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }

        .header-left { display: flex; align-items: center; gap: 25px; }
        .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--primary-color); }
        .nav-menu { display: flex; gap: 10px; list-style: none; margin: 0; padding: 0; }
        
        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-color);
        }

        .header-right { display: flex; align-items: center; gap: 20px; }
        
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(74, 144, 226, 0.3);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 220px 1fr 260px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .sidebar-link.active, .sidebar-link:hover {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .feed-container { display: flex; flex-direction: column; gap: 25px; }

        .create-post-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .create-post-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .btn-submit {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            float: right;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .clearfix::after { content: ""; clear: both; display: table; }

        .post-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .author-info { display: flex; flex-direction: column; }
        .author-name { font-weight: 700; font-size: 14px; color: var(--text-main); }
        .post-time { font-size: 12px; color: var(--text-muted); }

        .post-content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .widget {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .user-badge { display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">Workspace.</div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Trang chủ</a>
                <a href="#" class="nav-item active">Cộng đồng</a>
            </nav>
        </div>
        <div class="header-right">
            <i class="fa-regular fa-bell" style="font-size: 18px; cursor: pointer; color: var(--text-main);"></i>
            <img src="https://i.pravatar.cc/100?img=60" class="avatar" alt="User">
        </div>
    </header>

    <!-- Thân trang -->
    <div class="container">
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="#" class="sidebar-link active"><i class="fa-solid fa-rss"></i> Mới nhất</a></li>
                <li><a href="#" class="sidebar-link"><i class="fa-regular fa-user"></i> Đang theo dõi</a></li>
            </ul>
        </aside>

        <main class="feed-container">
            <div class="create-post-card clearfix">
                <textarea id="postInput" class="create-post-input" rows="3" placeholder="Chia sẻ suy nghĩ của bạn hôm nay nào..."></textarea>
                <button id="submitPost" class="btn-submit"><i class="fa-solid fa-pen"></i> Đăng bài</button>
            </div>

            <!-- Danh sách bài viết động từ Firebase sẽ đổ vào đây -->
            <div id="newsfeed">
                <p style="text-align: center; color: var(--text-muted);">Đang tải bài viết từ Cloud...</p>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="widget">
                <div class="user-badge">
                    <img src="https://i.pravatar.cc/100?img=60" class="avatar" style="width: 40px; height: 40px;" alt="User">
                    <div class="author-info">
                        <span class="author-name">nguy?n tu?n kh?i</span>
                        <span class="post-time" style="color: var(--primary-color); font-weight: 500;">Thành viên</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- TÍCH HỢP FIREBASE (DẠNG SCRIPTS MODULE) -->
    <script type="module">
        // Nhúng các thư viện cần dùng từ CDN của Firebase v10
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Cấu hình Firebase chính chủ của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyD8J4FX3qSFlCgYEPXaBGC9Lf6yhCHt9OY",
            authDomain: "giao-luu-fandom.firebaseapp.com",
            projectId: "giao-luu-fandom",
            storageBucket: "giao-luu-fandom.firebasestorage.app",
            messagingSenderId: "503216355558",
            appId: "1:503216355558:web:39483fb414e68536476327",
            measurementId: "G-RFP9J6HFPE"
        };

        // Khởi tạo Firebase và database Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const postInput = document.getElementById('postInput');
        const submitPost = document.getElementById('submitPost');
        const newsfeed = document.getElementById('newsfeed');

        // LẮNG NGHE DỮ LIỆU REALTIME TỪ FIREBASE (Tự động tải khi có bài mới)
        // Sắp xếp theo thời gian mới nhất xếp lên đầu (createdAt, 'desc')
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            newsfeed.innerHTML = ''; // Xóa sạch khung cũ để nạp dữ liệu mới
            
            if (snapshot.empty) {
                newsfeed.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Chưa có bài viết nào. Hãy là người đầu tiên đăng bài!</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                
                // Hàm định dạng ngày tháng hiển thị đơn giản
                let timeDisplay = "Vừa xong";
                if(post.createdAt) {
                    const date = post.createdAt.toDate();
                    timeDisplay = date.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) + " - " + date.toLocaleDateString('vi-VN');
                }

                const postHTML = `
                    <div class="post-card">
                        <div class="post-header">
                            <img src="${post.avatar || 'https://i.pravatar.cc/100?img=60'}" class="avatar" alt="User">
                            <div class="author-info">
                                <span class="author-name">${post.name}</span>
                                <span class="post-time">${timeDisplay}</span>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
                newsfeed.innerHTML += postHTML;
            });
        });

        // XỬ LÝ KHI NGƯỜI DÙNG BẤM NÚT ĐĂNG BÀI
        submitPost.addEventListener('click', async () => {
            const content = postInput.value.trim();
            if (content === '') {
                alert('Bạn chưa nhập nội dung gì cả!');
                return;
            }

            try {
                // Tạm thời gài thông tin người dùng mẫu để test tính năng lưu DB
                await addDoc(collection(db, "posts"), {
                    name: "nguy?n tu?n kh?i",
                    avatar: "https://i.pravatar.cc/100?img=60",
                    content: content,
                    createdAt: new Date() // Lưu thời gian đăng bài lên server
                });
                
                postInput.value = ''; // Đăng xong thì xóa trống khung nhập
            } catch (error) {
                console.error("Lỗi khi gửi bài lên Firebase: ", error);
                alert("Đăng bài thất bại, bạn đã bật Test Mode trong Firestore chưa?");
            }
        });
    </script>
</body>
</html>
